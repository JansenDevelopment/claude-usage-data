# Refreshes your Claude usage on a schedule.
#
# jsonbin is the CENTRAL store (shared with the laptop's Claude Code Stop hook, which
# also writes to the same bin). This workflow:
#   1. pushes usage to jsonbin (deduped) -- reads the current jsonbin history, appends
#      a point only when something changed, so the laptop's points are preserved;
#   2. mirrors jsonbin -> the `data` branch as a raw-URL backup that also keeps the
#      cron alive (a PAT commit counts as repo activity vs the 60-day auto-disable).
#
# The Tidbyt app reads jsonbin directly (freshest); the data branch is just backup.
# See README.md for the full (fork-and-go) setup.

name: push-usage

on:
  schedule:
    # Every 10 minutes. GitHub cron is best-effort (often 5-15 min); that's fine,
    # the app recomputes the countdown live from reset_at. Minimum interval is 5m.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # adds a manual "Run workflow" button (use it to test)

concurrency:
  group: push-usage
  cancel-in-progress: false   # let a slow run finish rather than overlap

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (code)
        uses: actions/checkout@v4
        with:
          # PAT so the mirror push counts as user activity and the cron is never
          # auto-disabled after 60 days of inactivity.
          token: ${{ secrets.DATA_PUSH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Push usage to jsonbin (central store, deduped)
        env:
          CLAUDE_SESSION_STATE: ${{ secrets.CLAUDE_SESSION_STATE }}
          CLAUDE_USAGE_URL: ${{ secrets.CLAUDE_USAGE_URL }}
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_ACCESS_KEY: ${{ secrets.JSONBIN_ACCESS_KEY }}
        # No USAGE_OUTPUT_FILE -> jsonbin mode: read jsonbin, append if changed, write.
        run: python push_usage.py

      - name: Mirror jsonbin -> data branch (backup, keeps the cron alive)
        env:
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_ACCESS_KEY: ${{ secrets.JSONBIN_ACCESS_KEY }}
        run: |
          # Pull the current central state and unwrap the jsonbin {"record": ...}.
          curl -sf -H "X-Access-Key: $JSONBIN_ACCESS_KEY" -H "User-Agent: Mozilla/5.0" \
            "https://api.jsonbin.io/v3/b/$JSONBIN_BIN_ID/latest" \
            | python -c "import sys,json; d=json.load(sys.stdin); json.dump(d.get('record', d), open('usage.json','w'))"
          git fetch origin data 2>/dev/null || true
          if git show origin/data:usage.json 2>/dev/null | diff -q - usage.json >/dev/null 2>&1; then
            echo "usage.json unchanged -- nothing to mirror."
            exit 0
          fi
          git config user.name "usage-bot"
          git config user.email "usage-bot@users.noreply.github.com"
          git checkout --orphan data-tmp
          git reset                       # unstage everything from the code branch
          git add -f usage.json
          git commit -m "Mirror usage.json"
          git push -f origin data-tmp:data
